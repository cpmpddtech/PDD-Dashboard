<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>Help &amp; FAQ — PDD Dashboard</title>
<link rel="icon" type="image/png" href="cpmpddlogo.png">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Myanmar:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --blue:#3b82f6;--blue2:#60a5fa;--blue-lt:rgba(59,130,246,.12);--blue-bd:rgba(59,130,246,.35);
    --surface:#0b1320;--surface2:#0f1825;--surface3:#16233a;--card:#111c2e;
    --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);
    --text:#e8f0f8;--muted:#7c97b4;--muted2:#5a7a9a;
    --green:#22c55e;--red:#ef4444;
    --font:'Plus Jakarta Sans',system-ui,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:var(--font);color:var(--text);min-height:100vh;
    background:radial-gradient(1200px 600px at 80% -10%,rgba(59,130,246,.10),transparent 60%),var(--surface);}
  [data-lang="my"] .my{font-family:'Noto Sans Myanmar',var(--font)}
  a{color:inherit}
  svg{display:block}
  .ic{width:1em;height:1em;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex:none}

  /* Top bar */
  .top{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:13px;
    padding:13px 22px;background:rgba(11,19,32,.72);backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border)}
  .top img{height:30px;border-radius:7px}
  .top .t1{font-size:15px;font-weight:800;letter-spacing:-.01em}
  .top .t2{font-size:11px;color:var(--muted)}
  .back{margin-left:auto;display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;
    color:var(--blue2);text-decoration:none;padding:8px 13px;border:1px solid var(--border2);border-radius:9px}
  .back:hover{background:var(--surface3)}

  .wrap{max-width:920px;margin:0 auto;padding:34px 20px 80px}

  /* Hero */
  .hero{text-align:center;margin-bottom:26px}
  .hero h1{font-size:30px;font-weight:800;letter-spacing:-.02em;margin-bottom:8px}
  .hero p{color:var(--muted);font-size:14px}
  .lang{display:inline-flex;gap:2px;margin:18px auto 0;padding:3px;background:var(--surface2);
    border:1px solid var(--border);border-radius:11px}
  .lang button{font-family:var(--font);font-size:12.5px;font-weight:700;color:var(--muted);
    background:none;border:none;padding:7px 16px;border-radius:8px;cursor:pointer}
  .lang button.on{background:var(--blue);color:#fff}

  /* Search */
  .search{position:relative;margin:22px 0 14px}
  .search .ic-s{position:absolute;left:16px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--muted)}
  .search input{width:100%;font-family:var(--font);font-size:15px;color:var(--text);
    background:var(--card);border:1px solid var(--border2);border-radius:13px;
    padding:15px 44px 15px 46px;outline:none;transition:border-color .15s,box-shadow .15s}
  .search input:focus{border-color:var(--blue-bd);box-shadow:0 0 0 4px var(--blue-lt)}
  .search input::placeholder{color:var(--muted2)}
  .clear{position:absolute;right:12px;top:50%;transform:translateY(-50%);display:none;
    background:var(--surface3);border:none;color:var(--muted);width:26px;height:26px;border-radius:50%;
    cursor:pointer;align-items:center;justify-content:center}
  .clear.show{display:flex}

  /* Chips */
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
  .chip{font-family:var(--font);font-size:12.5px;font-weight:600;color:var(--muted);cursor:pointer;
    background:var(--surface2);border:1px solid var(--border);border-radius:999px;padding:7px 14px;transition:all .12s}
  .chip:hover{color:var(--text);border-color:var(--border2)}
  .chip.on{background:var(--blue-lt);border-color:var(--blue-bd);color:var(--blue2)}
  .count{font-size:12px;color:var(--muted2);margin:14px 2px 10px}

  /* Category + items */
  .cat-h{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;
    color:var(--muted);margin:22px 4px 10px;display:flex;align-items:center;gap:9px}
  .cat-h .n{color:var(--muted2);font-weight:600;letter-spacing:0}
  .item{background:var(--card);border:1px solid var(--border);border-radius:13px;margin-bottom:9px;
    overflow:hidden;transition:border-color .15s}
  .item:hover{border-color:var(--border2)}
  .item.open{border-color:var(--blue-bd)}
  .q{width:100%;display:flex;align-items:center;gap:12px;text-align:left;cursor:pointer;
    background:none;border:none;font-family:var(--font);color:var(--text);padding:16px 17px;font-size:14.5px;font-weight:600}
  .q .qt{flex:1;line-height:1.45}
  .q .badge{font-size:10px;font-weight:700;letter-spacing:.03em;padding:3px 9px;border-radius:20px;flex:none}
  .role-staff{background:#eef1f5;color:#374151}.role-admin{background:#1e3a5f;color:#93c5fd}
  .role-finance{background:#3b1f5e;color:#c4b5fd}.role-manager{background:#14532d;color:#86efac}
  .q .chev{width:17px;height:17px;color:var(--muted);transition:transform .22s}
  .item.open .chev{transform:rotate(180deg);color:var(--blue2)}
  .a{display:grid;grid-template-rows:0fr;transition:grid-template-rows .24s ease}
  .item.open .a{grid-template-rows:1fr}
  .a-in{overflow:hidden}
  .a-tx{padding:0 17px 17px;color:#c7d6e6;font-size:13.7px;line-height:1.62}
  mark{background:rgba(96,165,250,.28);color:#dbeafe;border-radius:3px;padding:0 2px}

  /* Helpful */
  .help{display:flex;align-items:center;gap:10px;padding:11px 17px 16px;border-top:1px solid var(--border);margin-top:3px}
  .help .lab{font-size:12px;color:var(--muted)}
  .hbtn{font-family:var(--font);font-size:12px;font-weight:600;color:var(--text);background:var(--surface3);
    border:1px solid var(--border);border-radius:8px;padding:6px 13px;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
  .hbtn:hover{border-color:var(--border2)}
  .hbtn.pick{border-color:var(--blue-bd);color:var(--blue2)}
  .thanks{font-size:12px;color:var(--green);font-weight:600}

  .empty{display:none;text-align:center;color:var(--muted);padding:48px 0;font-size:14px}

  /* Contact */
  .contact{margin-top:34px;padding:24px;border-radius:16px;text-align:center;
    background:linear-gradient(135deg,rgba(59,130,246,.12),rgba(59,130,246,.03));
    border:1px solid var(--blue-bd)}
  .contact h3{font-size:16px;font-weight:800;margin-bottom:6px}
  .contact p{color:var(--muted);font-size:13px;margin-bottom:16px}
  .cbtn{display:inline-flex;align-items:center;gap:8px;font-size:13.5px;font-weight:700;
    background:var(--blue);color:#fff;text-decoration:none;padding:11px 20px;border-radius:11px}
  .cbtn:hover{background:#2f6fe0}

  @media(max-width:560px){.hero h1{font-size:24px}.wrap{padding:24px 15px 70px}}
</style>
</head>
<body>
  <header class="top">
    <img src="cpmpddlogo.png" alt="CPMPDD">
    <div><div class="t1">PDD Dashboard</div><div class="t2 my" data-en="Help Center" data-my="အကူအညီ စင်တာ">Help Center</div></div>
    <a class="back" href="index.html"><svg class="ic" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg><span class="my" data-en="Dashboard" data-my="ပင်မ">Dashboard</span></a>
  </header>

  <main class="wrap" id="root" data-lang="en">
    <div class="hero">
      <h1 class="my" data-en="How can we help?" data-my="ဘာများ ကူညီပေးရမလဲ?">How can we help?</h1>
      <p class="my" data-en="Search the guide or browse by topic." data-my="လမ်းညွှန်ကို ရှာဖွေပါ သို့မဟုတ် ခေါင်းစဉ်အလိုက် ကြည့်ပါ။">Search the guide or browse by topic.</p>
      <div class="lang">
        <button data-set="en" class="on">EN</button>
        <button data-set="my" class="my">မြန်မာ</button>
      </div>
    </div>

    <div class="search">
      <svg class="ic ic-s" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="q" type="text" autocomplete="off"
        data-en-ph="Search help…  e.g. password, check-in, expense"
        data-my-ph="ရှာဖွေရန်…  ဥပမာ — စကားဝှက်၊ check-in"
        placeholder="Search help…  e.g. password, check-in, expense">
      <button class="clear" id="clr" aria-label="Clear"><svg class="ic" viewBox="0 0 24 24" style="width:14px;height:14px"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
    </div>

    <div class="chips" id="chips"></div>
    <div class="count" id="count"></div>
    <div id="list"></div>
    <div class="empty my" id="empty" data-en="No matching questions. Try different words." data-my="ကိုက်ညီသော မေးခွန်း မတွေ့ပါ။ စကားလုံးပြောင်း၍ ပြန်ရှာပါ။">No matching questions. Try different words.</div>

    <div class="contact">
      <h3 class="my" data-en="Still need help?" data-my="အကူအညီ ဆက်လိုပါသလား?">Still need help?</h3>
      <p class="my" data-en="Contact your administrator and we'll get back to you." data-my="သင့် admin ကို ဆက်သွယ်ပါ — ပြန်လည် ဖြေကြားပေးပါမည်။">Contact your administrator and we'll get back to you.</p>
      <a class="cbtn" id="contact" href="#"><svg class="ic" viewBox="0 0 24 24" style="width:16px;height:16px"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3.5 7l8.5 6 8.5-6"/></svg><span class="my" data-en="Email administrator" data-my="Admin ထံ email ပို့ရန်">Email administrator</span></a>
    </div>
  </main>

<script>
(function(){
  // ===== EDIT THIS: support / admin email shown on the contact button =====
  const SUPPORT_EMAIL = 'admin@cpmpdd.org';

  const FAQ_CATS = [
        { key:'start',    en:'Getting Started',      my:'စတင်အသုံးပြုခြင်း' },
        { key:'tasks',    en:'Tasks & Check-ins',    my:'တာဝန်နှင့် Check-in' },
        { key:'finance',  en:'Finance',              my:'ဘဏ္ဍာရေး' },
        { key:'dcr',      en:'DCR Reports',          my:'DCR အစီရင်ခံစာ' },
        { key:'minutes',  en:'Meeting Minutes',      my:'အစည်းအဝေး မှတ်တမ်း' },
        { key:'announce', en:'Announcements',        my:'ကြေညာချက်များ' },
        { key:'account',  en:'Account & Password',   my:'အကောင့်နှင့် စကားဝှက်' },
      ];
  const FAQ_ROLES = {
        all:     { en:'All staff', my:'ဝန်ထမ်းအားလုံး', cls:'role-staff'   },
        admin:   { en:'Admin',     my:'Admin',          cls:'role-admin'   },
        finance: { en:'Finance',   my:'ဘဏ္ဍာရေး',       cls:'role-finance' },
        manager: { en:'Manager',   my:'မန်နေဂျာ',        cls:'role-manager' },
      };
  const FAQ_DATA = [
        // Getting Started
        { c:'start', r:'all',
          q:'What is the PDD Dashboard?',
          a:'It is the central system for managing PDD programs, tasks, finances, reports, meeting minutes and announcements. You log in with the username and password your administrator gives you.',
          qm:'PDD Dashboard ဆိုတာ ဘာလဲ?',
          am:'PDD ၏ programs, တာဝန်များ, ဘဏ္ဍာရေး, အစီရင်ခံစာများ, အစည်းအဝေးမှတ်တမ်းနှင့် ကြေညာချက်များကို စီမံခန့်ခွဲသည့် ဗဟိုစနစ်ဖြစ်သည်။ admin ပေးထားသော username နှင့် password ဖြင့် ဝင်ရောက်ပါ။' },
        { c:'start', r:'all',
          q:'How do I log in?',
          a:'Enter your username and password on the login screen. On your first login you will be asked to set a new password.',
          qm:'ဘယ်လို log in ဝင်ရမလဲ?',
          am:'Login screen တွင် သင့် username နှင့် password ကို ထည့်ပါ။ ပထမဆုံးအကြိမ် ဝင်ရောက်သည့်အခါ password အသစ် ပြောင်းရန် တောင်းခံပါမည်။' },
        { c:'start', r:'all',
          q:'Which tabs can I see?',
          a:'Tabs depend on your role. Everyone sees Profile, My Tasks, Program Progress and Help. Finance, Minutes, Announcements and Role Management appear only if your role allows them.',
          qm:'ကျွန်ုပ် ဘယ် tab တွေ မြင်ရမလဲ?',
          am:'Tab များသည် သင့် role ပေါ်မူတည်သည်။ အားလုံးက Profile, My Tasks, Program Progress နှင့် Help ကို မြင်ရသည်။ Finance, Minutes, Announcements, Role Management တို့ကို သင့် role ခွင့်ပြုမှသာ မြင်ရပါမည်။' },
        { c:'start', r:'all',
          q:'The page looks broken or data is not loading. What do I do?',
          a:'Refresh the page first — data is cached for about 10 seconds, so recent changes appear shortly after. If it keeps happening, check your internet connection and try logging out and back in.',
          qm:'စာမျက်နှာ ပျက်နေသည် / data မတက်လာပါ။ ဘယ်လိုလုပ်ရမလဲ?',
          am:'ပထမဆုံး စာမျက်နှာကို refresh လုပ်ပါ — data ကို စက္ကန့် ၁၀ ခန့် သိမ်းထားသဖြင့် မကြာမီ ပြောင်းလဲမှုများ ပေါ်လာပါမည်။ ဆက်ဖြစ်နေပါက internet ကို စစ်ပြီး log out / log in ပြန်လုပ်ကြည့်ပါ။' },
        { c:'start', r:'all',
          q:'Does the dashboard work on a phone?',
          a:'Yes. It works in any mobile browser. The tabs at the top scroll sideways.',
          qm:'ဖုန်းပေါ်တွင် အသုံးပြုလို့ ရလား?',
          am:'ရပါသည်။ မည်သည့် mobile browser တွင်မဆို အလုပ်လုပ်သည်။ အပေါ်ရှိ tab များကို ဘေးတိုက် ဆွဲ၍ ကြည့်နိုင်ပါသည်။' },

        // Tasks & Check-ins
        { c:'tasks', r:'all',
          q:'Where do I see my assigned tasks?',
          a:'Open the "My Tasks" tab. It lists the tasks assigned to you, grouped by program, with each task\'s current status.',

          am:'"My Tasks" tab ကို ဖွင့်ပါ။ သင့်အား ပေးအပ်ထားသော တာဝန်များကို program အလိုက် စုစည်းပြီး လက်ရှိ status နှင့်တကွ ပြသပါသည်။' },
        { c:'tasks', r:'all',
          q:'How do I submit my weekly check-in?',
          a:'Go to the "Weekly Check-in" tab, mark which tasks you delivered, add any blockers or notes, then submit. You can only submit your own check-in.',
          qm:'အပတ်စဉ် Check-in ကို ဘယ်လို တင်ရမလဲ?',
          am:'"Weekly Check-in" tab သို့ သွားပြီး ပြီးစီးခဲ့သော တာဝန်များကို မှတ်သားပါ၊ အခက်အခဲ (blockers) သို့မဟုတ် မှတ်ချက်များ ထည့်ပြီး submit လုပ်ပါ။ ကိုယ့် check-in ကိုသာ တင်နိုင်ပါသည်။' },
        { c:'tasks', r:'all',
          q:'What do the task statuses mean?',
          a:'Planned = not started yet · In Progress = being worked on · Delivered = completed · Cancelled = no longer needed.',
          qm:'Task status တွေရဲ့ အဓိပ္ပာယ်က ဘာလဲ?',
          am:'Planned = မစတင်ရသေး · In Progress = လုပ်ဆောင်နေဆဲ · Delivered = ပြီးစီးပြီ · Cancelled = မလိုအပ်တော့ပါ။' },
        { c:'tasks', r:'all',
          q:'Will I be reminded to check in?',
          a:'Yes. Every Monday morning the system emails a check-in reminder for the current week — as long as your email address is set on your account.',
          qm:'Check-in လုပ်ရန် သတိပေးပါ့မလား?',
          am:'ပေးပါသည်။ တနင်္လာနေ့ မနက်တိုင်း လက်ရှိအပတ်အတွက် check-in သတိပေးချက်ကို email ပို့ပါသည် — သင့်အကောင့်တွင် email သတ်မှတ်ထားမှသာ။' },
        { c:'tasks', r:'manager',
          q:'How do I see how my team is performing?',
          a:'Managers and admins can use the "Staff Performance" and "Manager Digest" tabs to see delivery rates and weekly summaries.',
          qm:'ကျွန်ုပ်အဖွဲ့၏ စွမ်းဆောင်ရည်ကို ဘယ်လို ကြည့်ရမလဲ?',
          am:'Manager နှင့် admin များသည် "Staff Performance" နှင့် "Manager Digest" tab များတွင် delivery rate နှင့် အပတ်စဉ် အကျဉ်းချုပ်များကို ကြည့်နိုင်ပါသည်။' },

        // Finance
        { c:'finance', r:'finance',
          q:'Who can use the Finance section?',
          a:'Only finance roles and admins (Finance Manager, Finance Officer, Admin/Manager). The Finance tab is hidden for other staff.',
          qm:'Finance အပိုင်းကို ဘယ်သူတွေ သုံးနိုင်လဲ?',
          am:'Finance role များနှင့် admin များ (Finance Manager, Finance Officer, Admin/Manager) သာ သုံးနိုင်သည်။ အခြားဝန်ထမ်းများအတွက် Finance tab ကို ဖျောက်ထားပါသည်။' },
        { c:'finance', r:'finance',
          q:'How do I record an expense?',
          a:'In Finance, open the budget, choose the line item and donor, pick the quarter, enter the amount and the expense date, then submit. It goes to a Finance Manager for approval.',

  let lang='en', cat='all', term='';
  const root=document.getElementById('root'),listEl=document.getElementById('list'),
        emptyEl=document.getElementById('empty'),qEl=document.getElementById('q'),
        clrEl=document.getElementById('clr'),chipsEl=document.getElementById('chips'),
        countEl=document.getElementById('count');
  let votes={}; try{votes=JSON.parse(localStorage.getItem('pdd_faq_votes')||'{}')}catch(e){}

  const esc=s=>String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const norm=s=>String(s||'').toLowerCase().normalize('NFKD');
  function ed1(a,b){ // edit distance <=1 quick check
    if(a===b)return true;const la=a.length,lb=b.length;if(Math.abs(la-lb)>1)return false;
    let i=0,j=0,e=0;while(i<la&&j<lb){if(a[i]===b[j]){i++;j++;}else{if(++e>1)return false;if(la>lb)i++;else if(lb>la)j++;else{i++;j++;}}}
    return e+(la-i)+(lb-j)<=1;
  }
  function matches(it){
    if(!term)return true;
    const hay=norm(it.q+' '+it.a+' '+it.qm+' '+it.am);
    const words=hay.split(/[^a-z0-9\u1000-\u109f]+/).filter(Boolean);
    return norm(term).split(/\s+/).filter(Boolean).every(tok=>
      hay.includes(tok) || (tok.length>=4 && words.some(w=>ed1(w,tok))));
  }
  function hi(text){ // highlight literal search tokens
    let out=esc(text); if(!term)return out;
    norm(term).split(/\s+/).filter(t=>t.length>=2).forEach(tok=>{
      const re=new RegExp('('+tok.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')',' ig');
      out=out.replace(re,'<mark>$1</mark>');
    });
    return out;
  }

  function renderChips(){
    let h='<div class="chip'+(cat==='all'?' on':'')+'" data-c="all"><span class="my" data-en="All" data-my="အားလုံး">'+(lang==='my'?'အားလုံး':'All')+'</span></div>';
    FAQ_CATS.forEach(c=>{h+='<div class="chip'+(cat===c.key?' on':'')+'" data-c="'+c.key+'">'+esc(lang==='my'?c.my:c.en)+'</div>';});
    chipsEl.innerHTML=h;
  }
  function render(){
    let total=0,h='';
    FAQ_CATS.forEach(c=>{
      if(cat!=='all'&&cat!==c.key)return;
      const items=FAQ_DATA.filter(it=>it.c===c.key&&matches(it));
      if(!items.length)return; total+=items.length;
      h+='<div class="cat-h">'+esc(lang==='my'?c.my:c.en)+'<span class="n">'+items.length+'</span></div>';
      items.forEach(it=>{
        const r=FAQ_ROLES[it.r]||FAQ_ROLES.all;
        const q=lang==='my'?(it.qm||it.q):it.q, a=lang==='my'?(it.am||it.a):it.a;
        const id=norm(it.q).replace(/[^a-z0-9]+/g,'-').slice(0,40);
        const open=!!term; const voted=votes[id];
        h+='<div class="item'+(open?' open':'')+'" data-id="'+id+'">'
          +'<button class="q"><span class="qt my">'+hi(q)+'</span>'
          +'<span class="badge '+r.cls+'">'+esc(lang==='my'?r.my:r.en)+'</span>'
          +'<svg class="ic chev" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg></button>'
          +'<div class="a"><div class="a-in"><div class="a-tx my">'+hi(a)+'</div>'
          +'<div class="help">'+(voted
              ?'<span class="thanks my" data-en="Thanks for your feedback." data-my="အကြံပြုချက်အတွက် ကျေးဇူးတင်ပါသည်။">'+(lang==='my'?'အကြံပြုချက်အတွက် ကျေးဇူးတင်ပါသည်။':'Thanks for your feedback.')+'</span>'
              :'<span class="lab my" data-en="Was this helpful?" data-my="ဒါ အထောက်အကူ ဖြစ်ခဲ့လား?">'+(lang==='my'?'ဒါ အထောက်အကူ ဖြစ်ခဲ့လား?':'Was this helpful?')+'</span>'
                +'<button class="hbtn" data-v="yes"><svg class="ic" viewBox="0 0 24 24" style="width:14px;height:14px"><path d="M7 11v9H4v-9zM7 11l4-8a2 2 0 0 1 3 2l-1 6h5a2 2 0 0 1 2 2.3l-1.2 6A2 2 0 0 1 19 20H7"/></svg>'+(lang==='my'?'ဟုတ်':'Yes')+'</button>'
                +'<button class="hbtn" data-v="no"><svg class="ic" viewBox="0 0 24 24" style="width:14px;height:14px"><path d="M17 13V4h3v9zM17 13l-4 8a2 2 0 0 1-3-2l1-6H6a2 2 0 0 1-2-2.3l1.2-6A2 2 0 0 1 7 4h10"/></svg>'+(lang==='my'?'မဟုတ်':'No')+'</button>')
          +'</div></div></div></div>';
      });
    });
    listEl.innerHTML=h; emptyEl.style.display=total?'none':'block';
    countEl.textContent=term?((lang==='my'?'ရလဒ် ':'')+total+(lang==='my'?' ခု':' result'+(total!==1?'s':'')+' found')):'';
  }
  function applyLang(){
    root.setAttribute('data-lang',lang);
    root.querySelectorAll('[data-en]').forEach(el=>{const v=el.getAttribute('data-'+lang);if(v!=null)el.innerHTML=v;});
    qEl.placeholder=qEl.getAttribute('data-'+lang+'-ph')||qEl.placeholder;
    document.querySelectorAll('.lang button').forEach(b=>b.classList.toggle('on',b.getAttribute('data-set')===lang));
    renderChips(); render();
  }

  // events
  qEl.addEventListener('input',()=>{term=qEl.value.trim();clrEl.classList.toggle('show',!!term);render();});
  clrEl.addEventListener('click',()=>{qEl.value='';term='';clrEl.classList.remove('show');qEl.focus();render();});
  chipsEl.addEventListener('click',e=>{const c=e.target.closest('.chip');if(!c)return;cat=c.getAttribute('data-c');renderChips();render();});
  document.querySelector('.lang').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;lang=b.getAttribute('data-set');applyLang();});
  listEl.addEventListener('click',e=>{
    const v=e.target.closest('.hbtn');
    if(v){const it=v.closest('.item');votes[it.getAttribute('data-id')]=v.getAttribute('data-v');
      try{localStorage.setItem('pdd_faq_votes',JSON.stringify(votes))}catch(_){}
      const row=v.closest('.help');row.innerHTML='<span class="thanks">'+(lang==='my'?'အကြံပြုချက်အတွက် ကျေးဇူးတင်ပါသည်။':'Thanks for your feedback.')+'</span>';return;}
    const q=e.target.closest('.q'); if(q)q.parentElement.classList.toggle('open');
  });
  document.getElementById('contact').addEventListener('click',e=>{
    e.preventDefault();
    location.href='mailto:'+SUPPORT_EMAIL+'?subject='+encodeURIComponent('PDD Dashboard — Help request');
  });

  applyLang();
})();
</script>
</body>
</html>
